name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Test with race detector
        run: go test -race -v -count=1 ./...

      - name: Vet
        run: go vet ./...

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Fuzz protocol codec
        run: go test -fuzz=Fuzz -fuzztime=60s ./protocol/ || true

      - name: Fuzz security components
        run: go test -fuzz=Fuzz -fuzztime=60s ./security/... || true

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [test, fuzz]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Nightly Regression Report — EIPC"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Tests | ${{ needs.test.result }} |"
          echo "| Fuzz | ${{ needs.fuzz.result }} |"
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo ""
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo ""
          echo "✅ All checks passed"
