name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-test:
    name: Full Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -v -count=1 ./...
      - name: Vet
        run: go vet ./...

  vulnerability-check:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  report:
    name: Weekly Report
    runs-on: ubuntu-latest
    needs: [full-test, vulnerability-check]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Weekly Report — EIPC"
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Full tests | ${{ needs.full-test.result }} |"
          echo "| Vulnerability check | ${{ needs.vulnerability-check.result }} |"
