name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -v ./...

  cross-compile:
    name: Cross-Compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          mkdir -p bin
          for cmd_dir in cmd/*/; do
            cmd_name=$(basename "$cmd_dir")
            go build -o "bin/${cmd_name}-${{ matrix.suffix }}${EXT}" "./${cmd_dir}"
          done
      - name: Package
        run: tar czf eipc-${{ steps.version.outputs.version }}-${{ matrix.suffix }}.tar.gz -C bin .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eipc-${{ matrix.suffix }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, cross-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eipc-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "EIPC ${{ steps.version.outputs.tag }}"
          body: |
            ## EIPC ${{ steps.version.outputs.tag }} - IPC Protocol
            Initial release of the inter-process communication protocol library.
          files: "*.tar.gz"
