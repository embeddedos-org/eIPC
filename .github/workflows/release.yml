name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  test:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test -race -v ./...

  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: riscv64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: freebsd
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist
          for cmd in cmd/eipc-server cmd/eipc-client cmd/eipc-cli; do
            NAME=$(basename $cmd)
            go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
              -o dist/${NAME}${EXT} ./${cmd} 2>/dev/null || true
          done
          tar czf eipc-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: eipc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: eipc-*
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Generate SBOM (CycloneDX v1.5)
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          UUID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo "00000000-0000-0000-0000-$(date +%s)")
          cat > sbom.cdx.json << EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "serialNumber": "urn:uuid:${UUID}",
            "version": 1,
            "metadata": {
              "timestamp": "${TIMESTAMP}",
              "component": {
                "type": "library",
                "name": "eIPC",
                "version": "${{ steps.version.outputs.tag }}",
                "supplier": { "name": "embeddedos-org" },
                "licenses": [{ "license": { "id": "MIT" } }]
              }
            },
            "components": []
          }
          EOF
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign artifacts
        run: |
          for f in *.tar.gz; do
            cosign sign-blob --yes --bundle "${f}.sig.bundle" "$f" 2>/dev/null || true
          done
      - name: Check release does not already exist
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "::error::Release already exists."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "eIPC ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          body: |
            ### Release Integrity
            - `SHA256SUMS.txt` — checksums
            - `sbom.cdx.json` — CycloneDX SBOM (v1.5)
            - `*.sig.bundle` — Sigstore cosign signatures
          files: |
            *.tar.gz
            *.sig.bundle
            SHA256SUMS.txt
            sbom.cdx.json
          prerelease: ${{ contains(steps.version.outputs.tag, 'rc') || contains(steps.version.outputs.tag, 'beta') }}
